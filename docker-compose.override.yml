version: '3.8'

services:
  app:
    ports:
      - "8080:8080"
    command: make dev
    environment:
      - NODE_ENV=development
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blog_development
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
