name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build test image
      run: |
        docker build -f Dockerfile.production -t app-test:latest .
    
    - name: Start PostgreSQL
      run: |
        docker run -d \
          --name postgres \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=password \
          -e POSTGRES_DB=blog_test \
          -p 5432:5432 \
          postgres:15-alpine
    
    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          if docker exec postgres pg_isready -U postgres; then
            echo "PostgreSQL is ready"
            break
          fi
          echo "Waiting for PostgreSQL... $i"
          sleep 2
        done
    
    - name: Run tests
      run: |
        docker run --rm \
          --link postgres:postgres \
          -e NODE_ENV=test \
          -e DATABASE_HOST=postgres \
          -e DATABASE_PORT=5432 \
          -e DATABASE_NAME=blog_test \
          -e DATABASE_USERNAME=postgres \
          -e DATABASE_PASSWORD=password \
          app-test:latest \
          make test
    
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Build and push production image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.production
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/docker-project-74:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
